# ============================================================
# GASING CIRCLE — Academy News Layout: Theme Settings
# Admin dapat mengubah warna dan font melalui panel admin
# Customize > Components > Gasing Circle - Academy News Layout
# ============================================================

# ----------------------------------------------------------
# WARNA UTAMA (Brand / Accent)
# ----------------------------------------------------------
gc_primary_color:
  default: "#4a6cf7"
  type: color
  description: "Warna utama (tombol, state aktif, tautan)"

gc_primary_dark_color:
  default: "#1b2e7b"
  type: color
  description: "Warna utama gelap (hover tombol, pill aktif)"

gc_primary_light_color:
  default: "#eef2ff"
  type: color
  description: "Warna utama terang (latar badge, hover background)"

# ----------------------------------------------------------
# HERO BANNER
# ----------------------------------------------------------
gc_hero_start_color:
  default: "#2bb5e0"
  type: color
  description: "Warna awal gradasi hero banner (kiri)"

gc_hero_end_color:
  default: "#4a7cf7"
  type: color
  description: "Warna akhir gradasi hero banner (kanan)"

# ----------------------------------------------------------
# LATAR / BACKGROUND
# ----------------------------------------------------------
gc_page_bg_color:
  default: "#f4f6fb"
  type: color
  description: "Warna latar halaman utama"

gc_card_bg_color:
  default: "#ffffff"
  type: color
  description: "Warna latar kartu artikel dan panel detail"

gc_card_border_color:
  default: "#e8ecf4"
  type: color
  description: "Warna border/garis kartu artikel"

# ----------------------------------------------------------
# TEKS
# ----------------------------------------------------------
gc_text_primary_color:
  default: "#1a1f36"
  type: color
  description: "Warna teks utama (judul, konten)"

gc_text_secondary_color:
  default: "#6b7280"
  type: color
  description: "Warna teks sekunder (deskripsi, komentar)"

gc_text_muted_color:
  default: "#9ca3af"
  type: color
  description: "Warna teks redup (metadata, tanggal, ikon)"

# ----------------------------------------------------------
# GARIS PEMBATAS
# ----------------------------------------------------------
gc_divider_color:
  default: "#e5e7eb"
  type: color
  description: "Warna garis pemisah / divider"

# ----------------------------------------------------------
# TAG KATEGORI
# ----------------------------------------------------------
gc_tag_pelatihan_color:
  default: "#ff9500"
  type: color
  description: "Warna teks tag 'Pelatihan'"

gc_tag_pendidikan_color:
  default: "#4a6cf7"
  type: color
  description: "Warna teks tag 'Pendidikan'"

gc_tag_dunia_color:
  default: "#10b981"
  type: color
  description: "Warna teks tag 'Dunia'"

gc_tag_lainnya_color:
  default: "#8b5cf6"
  type: color
  description: "Warna teks tag 'Lainnya'"

# ----------------------------------------------------------
# FONT
# ----------------------------------------------------------
gc_font_body:
  default: "Nunito"
  type: enum
  choices:
    - Nunito
    - Inter
    - Poppins
    - Roboto
    - "Open Sans"
    - Lato
  description: "Jenis font untuk seluruh tampilan komponen"
