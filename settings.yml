# ============================================================
# GASING CIRCLE — Academy News Layout: Theme Settings
# Admin dapat mengubah warna dan font melalui panel admin
# Customize > Components > Gasing Circle - Academy News Layout
# ============================================================

# ----------------------------------------------------------
# TARGET KATEGORI
# ----------------------------------------------------------
gc_category_slug:
  default: "ga-updates"
  type: string
  description: "Slug kategori tempat layout ini aktif (contoh: ga-updates). Cek URL /c/slug-nya di sini."

# ----------------------------------------------------------
# WARNA UTAMA (Brand / Accent)
# ----------------------------------------------------------
gc_primary_color:
  default: "#1976D2"
  type: string
  description: "Warna utama (tombol, state aktif, tautan)"

gc_primary_dark_color:
  default: "#1565C0"
  type: string
  description: "Warna utama gelap (hover tombol, pill aktif)"

gc_primary_light_color:
  default: "#E3F2FD"
  type: string
  description: "Warna utama terang (latar badge, hover background)"

# ----------------------------------------------------------
# HERO BANNER
# ----------------------------------------------------------
gc_hero_title:
  default: "Gasing Academy News 📢"
  type: string
  description: "Judul utama hero banner (termasuk emoji jika diinginkan)"

gc_hero_subtitle:
  default: "Ikuti berita dan perkembangan terkini seputar Gasing!"
  type: string
  description: "Teks deskripsi di bawah judul hero banner"

gc_hero_start_color:
  default: "#00BCD4"
  type: string
  description: "Warna awal gradasi hero banner (kiri)"

gc_hero_end_color:
  default: "#1565C0"
  type: string
  description: "Warna akhir gradasi hero banner (kanan)"

# ----------------------------------------------------------
# LATAR / BACKGROUND
# ----------------------------------------------------------
gc_page_bg_color:
  default: "#F5F5F5"
  type: string
  description: "Warna latar halaman utama"

gc_card_bg_color:
  default: "#ffffff"
  type: string
  description: "Warna latar kartu artikel dan panel detail"

gc_card_border_color:
  default: "#E0E0E0"
  type: string
  description: "Warna border/garis kartu artikel"

# ----------------------------------------------------------
# TEKS
# ----------------------------------------------------------
gc_text_primary_color:
  default: "#212121"
  type: string
  description: "Warna teks utama (judul, konten)"

gc_text_secondary_color:
  default: "#757575"
  type: string
  description: "Warna teks sekunder (deskripsi, komentar)"

gc_text_muted_color:
  default: "#9E9E9E"
  type: string
  description: "Warna teks redup (metadata, tanggal, ikon)"

# ----------------------------------------------------------
# GARIS PEMBATAS
# ----------------------------------------------------------
gc_divider_color:
  default: "#E0E0E0"
  type: string
  description: "Warna garis pemisah / divider"

# ----------------------------------------------------------
# TAG KATEGORI
# ----------------------------------------------------------
gc_tag_pelatihan_color:
  default: "#FF9800"
  type: string
  description: "Warna latar/teks tag 'Pelatihan' (solid background)"

gc_tag_pendidikan_color:
  default: "#1976D2"
  type: string
  description: "Warna latar/teks tag 'Pendidikan' (solid background)"

gc_tag_dunia_color:
  default: "#10B981"
  type: string
  description: "Warna latar/teks tag 'Dunia' (solid background)"

gc_tag_lainnya_color:
  default: "#8B5CF6"
  type: string
  description: "Warna latar/teks tag 'Lainnya' (solid background)"

# ----------------------------------------------------------
# FONT
# ----------------------------------------------------------
gc_font_body:
  default: "Nunito"
  type: enum
  choices:
    - Nunito
    - Inter
    - Poppins
    - Roboto
    - "Open Sans"
    - Lato
  description: "Jenis font untuk seluruh tampilan komponen"
